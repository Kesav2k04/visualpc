# =====================================================
# VisualPC — Docker Compose (Production)
# PostgreSQL + Master Scheduler + Monitoring API + Frontend
# =====================================================

version: "3.9"

services:
  # ----- PostgreSQL -----
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visualpc_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----- Master Scheduler (port 9000) -----
  master:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9000:9000"
    environment:
      MONITOR_API_URL: http://backend:8500
      GPU_WORKER_URL: ${GPU_WORKER_URL:-http://localhost:7000/execute-job}
    depends_on:
      - backend
    command: >
      python master.py

  # ----- Monitoring API (port 8500) -----
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8500:8500"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/visualpc_monitor
      VISUALPC_SECRET_KEY: ${VISUALPC_SECRET_KEY:-visualpc-prod-secret-change-me}
      FASTAPI_SECRET_KEY: ${VISUALPC_SECRET_KEY:-visualpc-prod-secret-change-me}
      ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
      MASTER_NODE_URL: http://master:9000
      GPU_WORKER_PORT: ${GPU_WORKER_PORT:-7000}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python -m backend.migrate &&
             python -m backend.init_db &&
             python -m uvicorn backend.metrics_api:app --host 0.0.0.0 --port 8500"

  # ----- Next.js Frontend (port 3000) -----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8500
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-visualpc-nextauth-secret-change-me}
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_ID: ${GITHUB_ID:-}
      GITHUB_SECRET: ${GITHUB_SECRET:-}
    depends_on:
      - backend

volumes:
  pgdata:
